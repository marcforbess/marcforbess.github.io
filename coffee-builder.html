<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forbes.co - Coffee Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/dashboard-page.css" />
    <link rel="stylesheet" href="css/inventory-page.css" />
    <link rel="stylesheet" href="css/unlock-modal.css" />
    <link rel="stylesheet" href="css/coffee-builder.css" />
</head>

<body>
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-dot"></span>
                <div>
                    <p class="brand-name">forbes.co</p>
                    <p class="brand-sub" style="font-weight: bold;">v1.0.0</p>
                    <p id="brand-date" class="brand-sub"></p>
                </div>
            </div>

            <nav class="sidebar-nav" aria-label="Primary">
                <button class="nav-item" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" onclick="window.location.href='mails.html'">
                    <i class="bi bi-envelope"></i>
                    <span>Mails</span>
                </button>
                <button class="nav-item" onclick="window.location.href='forum.html'">
                    <i class="bi bi-chat-quote"></i>
                    <span>Forum</span>
                </button>
                <button class="nav-item" onclick="window.location.href='profile.html'">
                    <i class="bi bi-person"></i>
                    <span>My Profile</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <!-- <div class="sidebar-note">
                    <p class="note-title">Coffee Time</p>
                    <p class="note-copy">Brewing something special today.</p>
                </div> -->
                <button id="logout-btn" class="btn solid sidebar-logout" type="button">
                    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
                        <i class="bi bi-layout-sidebar-inset"></i>
                    </button>
                    <div>
                        <h1>Coffee Builder <i class="bi bi-stars"></i></h1>
                        <p id="session-status" class="session-status">Build your perfect cup</p>
                    </div>
                </div>
            </header>

            <div class="builder-container">
                <div class="options-grid">

                    <!-- Form Side -->
                    <div class="builder-card form-card">

                        <!-- Temperature -->
                        <div class="builder-section">
                            <h3><i class="bi bi-thermometer-half"></i> Temperature</h3>
                            <div class="pill-group" id="temp-group">
                                <button class="pill-btn" data-val="Iced">Iced</button>
                                <button class="pill-btn selected" data-val="Hot">Hot</button>
                            </div>
                        </div>

                        <!-- Coffee Roast -->
                        <div class="builder-section">
                            <h3><i class="bi bi-cup"></i> Coffee Roast</h3>
                            <div class="pill-group" id="roast-group">
                                <button class="pill-btn" data-val="Light Roast">Light</button>
                                <button class="pill-btn selected" data-val="Medium Roast">Medium</button>
                                <button class="pill-btn" data-val="Dark Roast">Dark</button>
                            </div>
                        </div>

                        <!-- Espresso Shots -->
                        <div class="builder-section">
                            <h3><i class="bi bi-droplet"></i> Espresso Shots</h3>
                            <div class="counter-wrap">
                                <button class="icon-btn" id="shot-minus"><i class="bi bi-dash"></i></button>
                                <span class="counter-val" id="shot-count">1</span>
                                <button class="icon-btn" id="shot-plus"><i class="bi bi-plus"></i></button>
                            </div>
                        </div>

                        <!-- Milk Type -->
                        <div class="builder-section">
                            <h3><i class="bi bi-cup-straw"></i> Type of Milk</h3>
                            <div class="pill-group" id="milk-group">
                                <button class="pill-btn selected" data-val="Fresh Milk">Fresh Milk</button>
                                <button class="pill-btn" data-val="Oat Milk">Oat</button>
                                <button class="pill-btn" data-val="Almond Milk">Almond</button>
                                <button class="pill-btn" data-val="No Milk">None</button>
                            </div>
                        </div>

                        <!-- Syrups -->
                        <div class="builder-section">
                            <h3><i class="bi bi-droplet-half"></i> Syrups</h3>
                            <div class="syrup-list">
                                <div class="syrup-item" data-syrup="Vanilla">
                                    <span class="syrup-name">Vanilla</span>
                                    <div class="counter-wrap small">
                                        <button class="icon-btn syrup-minus"><i class="bi bi-dash"></i></button>
                                        <span class="counter-val syrup-count">0</span>
                                        <button class="icon-btn syrup-plus"><i class="bi bi-plus"></i></button>
                                    </div>
                                </div>
                                <div class="syrup-item" data-syrup="Caramel">
                                    <span class="syrup-name">Caramel</span>
                                    <div class="counter-wrap small">
                                        <button class="icon-btn syrup-minus"><i class="bi bi-dash"></i></button>
                                        <span class="counter-val syrup-count">0</span>
                                        <button class="icon-btn syrup-plus"><i class="bi bi-plus"></i></button>
                                    </div>
                                </div>
                                <div class="syrup-item" data-syrup="Hazelnut">
                                    <span class="syrup-name">Hazelnut</span>
                                    <div class="counter-wrap small">
                                        <button class="icon-btn syrup-minus"><i class="bi bi-dash"></i></button>
                                        <span class="counter-val syrup-count">0</span>
                                        <button class="icon-btn syrup-plus"><i class="bi bi-plus"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button class="btn solid brew-btn" id="brew-btn">
                            <i class="bi bi-magic"></i> Brew Coffee
                        </button>
                    </div>

                    <!-- Output Side -->
                    <div class="builder-card result-card">
                        <div class="ticket">
                            <h2 class="ticket-brand">forbes.co(ffee)</h2>
                            <div class="ticket-divider"></div>

                            <div class="order-details" id="order-details">
                                <p class="placeholder-text">Brew your coffee first.</p>
                                <!-- JS outputs content here -->
                            </div>

                            <div class="ticket-divider"></div>
                            <div class="ticket-bottom">
                                <div class="barcode"></div>
                                <p class="thanks-note">We don't judge your coffee order!</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
    </div>
    <script src="js/sidebar.js"></script>
    <script src="js/inventory-page.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/unlock-modal.js"></script>
    <script src="js/coffee-builder.js"></script>
</body>

</html>
