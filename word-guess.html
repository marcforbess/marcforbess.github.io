<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forbes.co - Word Guess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/dashboard-page.css" />
    <link rel="stylesheet" href="css/word-guess.css" />
    <link rel="stylesheet" href="css/unlock-modal.css" />
</head>

<body>
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-dot"></span>
                <div>
                    <p class="brand-name">forbes.co</p>
                    <p class="brand-sub" style="font-weight: bold;">v1.0.0</p>
                    <p id="brand-date" class="brand-sub"></p>
                </div>
            </div>

            <nav class="sidebar-nav" aria-label="Primary">
                <button class="nav-item" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" onclick="window.location.href='mails.html'">
                    <i class="bi bi-envelope"></i>
                    <span>Mails</span>
                </button>
                <button class="nav-item" onclick="window.location.href='forum.html'">
                    <i class="bi bi-chat-quote"></i>
                    <span>Forum</span>
                </button>
                <button class="nav-item" onclick="window.location.href='profile.html'">
                    <i class="bi bi-person"></i>
                    <span>My Profile</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="btn solid sidebar-logout" type="button">
                    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
                        <i class="bi bi-layout-sidebar-inset"></i>
                    </button>
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <!-- <img src="media/idea.png" alt="Concept Icon"
                            style="height: 48px; width: 48px; object-fit: contain;"> -->
                        <div>
                            <h1>Oh That Word</h1>
                            <p id="session-status" class="session-status">Can you guess your first word?</p>
                        </div>
                    </div>
                </div>
            </header>

            <section class="wordle-container">
                <div id="wordle-grid" class="wordle-grid">
                    <!-- Grid generated by JS -->
                </div>

                <div id="wordle-keyboard" class="wordle-keyboard" role="group" aria-label="Virtual keyboard">
                    <div class="keyboard-row">
                        <button class="key" data-key="Q">Q</button>
                        <button class="key" data-key="W">W</button>
                        <button class="key" data-key="E">E</button>
                        <button class="key" data-key="R">R</button>
                        <button class="key" data-key="T">T</button>
                        <button class="key" data-key="Y">Y</button>
                        <button class="key" data-key="U">U</button>
                        <button class="key" data-key="I">I</button>
                        <button class="key" data-key="O">O</button>
                        <button class="key" data-key="P">P</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="key" data-key="A">A</button>
                        <button class="key" data-key="S">S</button>
                        <button class="key" data-key="D">D</button>
                        <button class="key" data-key="F">F</button>
                        <button class="key" data-key="G">G</button>
                        <button class="key" data-key="H">H</button>
                        <button class="key" data-key="J">J</button>
                        <button class="key" data-key="K">K</button>
                        <button class="key" data-key="L">L</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="key wide" data-key="ENTER"><i class="bi bi-arrow-return-left"></i></button>
                        <button class="key" data-key="Z">Z</button>
                        <button class="key" data-key="X">X</button>
                        <button class="key" data-key="C">C</button>
                        <button class="key" data-key="V">V</button>
                        <button class="key" data-key="B">B</button>
                        <button class="key" data-key="N">N</button>
                        <button class="key" data-key="M">M</button>
                        <button class="key wide" data-key="BACKSPACE"><i class="bi bi-backspace"></i></button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="game-over-modal">
            <div class="game-over-content">
                <div class="game-over-visual">
                    <img src="media/idea.png" alt="Game Over"
                        style="height: 100px; width: 100px; filter: grayscale(1) opacity(0.7); object-fit: contain;">
                </div>
                <h2>Game Over!</h2>
                <p>Really? You couldn't figure that out? Welp, start over then.</p>
                <button id="restart-game-btn" class="restart-btn">
                    <i class="bi bi-arrow-clockwise"></i> Try Again From Round 1
                </button>
            </div>
        </div>

        <div id="sidebar-overlay" class="sidebar-overlay"></div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/inventory-page.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/unlock-modal.js"></script>
    <script src="js/word-guess.js"></script>
</body>

</html>
