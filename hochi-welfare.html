<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forbes.co - Hochi Welfare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard-page.css">
    <link rel="stylesheet" href="css/hochi-page.css">
    <link rel="stylesheet" href="css/unlock-modal.css" />
</head>

<body>
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-dot"></span>
                <div>
                    <p class="brand-name">forbes.co</p>
                    <p class="brand-sub" style="font-weight: bold;">v1.0.0</p>
                    <p id="brand-date" class="brand-sub"></p>
                </div>
            </div>

            <nav class="sidebar-nav" aria-label="Primary">
                <button class="nav-item" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" onclick="window.location.href='mails.html'">
                    <i class="bi bi-envelope"></i>
                    <span>Mails</span>
                </button>
                <button class="nav-item" onclick="window.location.href='forum.html'">
                    <i class="bi bi-chat-quote"></i>
                    <span>Forum</span>
                </button>
                <button class="nav-item" onclick="window.location.href='profile.html'">
                    <i class="bi bi-person"></i>
                    <span>My Profile</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <!-- <div class="sidebar-note">
                    <p class="note-title">Welfare Check</p>
                    <p class="note-copy">Keep Hochi happy to unlock special rewards.</p>
                    <a href="javascript:resetHochiStats()"
                        style="font-size: 0.7rem; color: var(--burgundy); opacity: 0.6; text-decoration: underline; margin-top: 0.5rem; display: block;">Reset
                        Stats</a>
                </div> -->
                <button id="logout-btn" class="btn solid sidebar-logout" type="button">
                    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
                        <i class="bi bi-layout-sidebar-inset"></i>
                    </button>
                    <div>
                        <h1>Hochi Welfare</h1>
                        <p class="session-status">Take care of Hochi</p>
                    </div>
                </div>
            </header>

            <div class="hochi-container">
                <div class="hochi-card">
                    <div class="hochi-visual-wrap">
                        <img src="media/hochi.jpeg" alt="Hochi" class="hochi-image">
                        <div class="mood-vibe" id="hochi-vibe">Purring...</div>
                    </div>

                    <div class="stats-container">
                        <div class="stat-row">
                            <div class="stat-label">
                                <span><i class="bi bi-lightning-fill"></i> Energy</span>
                                <span id="energy-val">50%</span>
                            </div>
                            <div class="progress-bar-wrap">
                                <div id="energy-bar" class="progress-fill" style="width: 50%;"></div>
                            </div>
                        </div>

                        <div class="stat-row">
                            <div class="stat-label">
                                <span><i class="bi bi-emoji-smile-fill"></i> Happiness</span>
                                <span id="happiness-val">50%</span>
                            </div>
                            <div class="progress-bar-wrap">
                                <div id="happiness-bar" class="progress-fill" style="width: 50%;"></div>
                            </div>
                        </div>

                        <div class="stat-row">
                            <div class="stat-label">
                                <span><i class="bi bi-heart-fill"></i> Bond</span>
                                <span id="bond-val">50%</span>
                            </div>
                            <div class="progress-bar-wrap">
                                <div id="bond-bar" class="progress-fill" style="width: 50%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="action-btn" id="feed-btn">
                            <i class="bi bi-egg-fried"></i>
                            <span>Feed</span>
                        </button>
                        <button class="action-btn" id="play-btn">
                            <i class="bi bi-controller"></i>
                            <span>Play</span>
                        </button>
                        <button class="action-btn" id="pet-btn">
                            <i class="bi bi-hand-index-thumb-fill"></i>
                            <span>Pet</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <div id="sidebar-overlay" class="sidebar-overlay"></div>
    </div>



    <!-- Warning Modal for Low Stats -->
    <div id="warning-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-visual warning">
                <i class="bi bi-exclamation-triangle" style="color: #e65100;"></i>
            </div>
            <h2>Careful Now...</h2>
            <p id="warning-desc">Please take care of Hochi carefully. Remember, playing too much can cause her energy to
                drain rapidly!</p>
            <div class="modal-actions">
                <button id="warning-close" class="btn solid"
                    style="width: 100%; background: #e65100; border-color: #e65100;">I'll be careful</button>
            </div>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/inventory-page.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/unlock-modal.js"></script>
    <script src="js/hochi-page.js"></script>
</body>

</html>
